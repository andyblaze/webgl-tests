<body>

<script type="importmap">
{
  "imports": {
    "three":"https://cdn.jsdelivr.net/npm/three@0.170/build/three.module.js",
    "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170/examples/jsm/"
  }
}
</script>

<script type="module">

import * as THREE from "three";

function clamp(mn, mx, val) {
    return Math.max(mn, Math.min(mx, val));
}

function smoothstep(edge0, edge1, x) {
    const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
    return t * t * (3 - 2 * t);
}

function mt_rand(min = 0, max = 1) {
    min = Math.ceil(min);
    max = Math.floor(max);
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function mt_randf(min = 0, max = 1) {
    return Math.random() * (max - min) + min;
}

function makeCamera() {
    const cam = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100
    );
    cam.position.z = 12;
    return cam;
}

function makeRenderer() {
    const rdr = new THREE.WebGLRenderer({
        antialias:true
    });
    rdr.setSize(window.innerWidth, window.innerHeight);
    return rdr;
}

function makeLights(scene) {
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(5, 10, 10);
    scene.add(light);
}

function randomFrom(arr) {
    return arr[mt_rand(0, arr.length - 1)];
}

const colours = [
    0xff3300, // red
    0xff8800, // orange
    0xffdd00, // yellow
    0x00ff66, // green
    0x00ccff, // cyan
    0x3366ff, // blue
    0xaa33ff, // purple
    0xff33aa  // pink
];

class Blob {
    constructor(three, sz) {
        this.blb = new three.Mesh(
        new three.SphereGeometry(sz, 48, 48),
            new three.MeshStandardMaterial({
                color:randomFrom(colours),
                emissive:0xaa2200,
                emissiveIntensity: 0.8,
                roughness:0.35
            })
        );
        this.blb.position.y = mt_randf(-0.5, 0.5);
        
        this.temperature = 0;
        this.velocity = 0;

        this.heatRate = 2 + mt_randf();
        this.coolRate = 2 + mt_randf();
        this.drag = mt_rand(40, 50);
        this.buoyancyFactor = mt_randf(0.01, 0.02);
        this.top = 1.8;
        this.bottom = -2;
        this.boundaryZone = 0.4;   // how far from top/bottom it affects
        this.boundaryDamping = 0.1; // how strong the slowdown is
    }
    update(dt) {
        this.applyPhysics(dt);
        const stretch = 1 + Math.abs(this.velocity) * 48;
        this.blb.scale.y = stretch;
        this.blb.scale.x = 1 / Math.sqrt(stretch);
        this.blb.scale.z = 1 / Math.sqrt(stretch);
    }
    applyPhysics(dt) {
        let targetTemp = this.temperature; // placeholder for now

        if (this.posY < this.bottom)
            targetTemp += this.heatRate * dt;

        if (this.posY > this.top)
            targetTemp -= this.coolRate * dt;

        this.temperature += (targetTemp - this.temperature) * 0.15;
        this.temperature = clamp(0, 1, this.temperature);
        // Buoyancy
        const buoyancy = (this.temperature - 0.5) * this.buoyancyFactor;
        this.velocity += buoyancy;
        // 🧪 NEW: fake boundary density layer
        let boundaryFactor = 1.0;
        // bottom zone
        if (this.posY < this.bottom + this.boundaryZone) {
            const t = (this.posY - this.bottom) / this.boundaryZone; // 0..1
            boundaryFactor *= (this.boundaryDamping + (1 - this.boundaryDamping) * t);
        }
        // top zone
        if (this.posY > this.top - this.boundaryZone) {
            const t = (this.top - this.posY) / this.boundaryZone; // 0..1
            boundaryFactor *= (this.boundaryDamping + (1 - this.boundaryDamping) * t);
        }
        // Drag (now boundary-aware)
        this.velocity *= Math.exp(-this.drag * dt) * boundaryFactor;
        this.posY += this.velocity;
        // Reset cycle (keep your logic)
        if (this.posY > this.top && this.velocity > 0)
            this.velocity *= 0.98;

        if (this.posY < this.bottom && this.velocity < 0)
            this.velocity *= 0.98;
        return this.velocity;
    }
    get posY() {
        return this.blb.position.y;
    }
    set posY(y) {
        this.blb.position.y = y;
    }
    get actual() {
        return this.blb;
    }
}

const scene = new THREE.Scene();

const camera = makeCamera();
const renderer = makeRenderer(); 
document.body.appendChild(renderer.domElement);

makeLights(scene);

class Lamp {
    constructor(three) {
        this.height = 4;
        this.group = new three.Group();
        
        this.blob = new Blob(three, 0.25);
        this.group.add(this.blob.actual);

        this.makeGlass(three);

        const capGeo = new three.CylinderGeometry(0.32, 0.38, 0.5);
        const baseGeo = new three.CylinderGeometry(0.8, 0.6, 0.5, 32, 1, true);
        const steelMat = new three.MeshPhysicalMaterial({
            color: 0xb8bcc2,
            metalness: 1.0,
            roughness: 0.28,
        });

        this.makeCap(three, capGeo, steelMat);
        this.makeBase(three, baseGeo, steelMat);        
        this.makeLight(three);
        
    }
    makeGlass(three) {
        const glassGeometry = new three.CylinderGeometry(0.32, 0.8, this.height);
        const glassMaterial = new three.MeshPhysicalMaterial({
            transmission: 0.371,
            transparent: true,
            opacity: 0.102492,
            roughness: 0.8,
            thickness: 0.8,
        });

        this.glass = new three.Mesh(glassGeometry, glassMaterial);
        this.group.add(this.glass);
    }
    makeCap(three, geo, mat) {
        this.cap = new  three.Mesh(geo, mat);
        this.cap.position.y = this.height - 2.2;
        this.group.add(this.cap);
    }
    makeBase(three, geo, mat) {
        this.base = new  three.Mesh(geo, mat);
        this.base.position.y = -(this.height - 1.8);
        this.group.add(this.base);
    }
    makeLight(three) {
        this.lamplight = new three.PointLight(0xff6600, 100, 4);
        this.lamplight.position.y = -(this.height - 1.6);
        this.group.add(this.lamplight);
    }
    setPosition(x, y, z) {
        this.group.position.x = x;
        this.group.position.y = y;
        this.group.position.z = z;
    }
    update(dt) {
        this.blob.update(dt);
    }
    get actual() {
        return this.group;
    }
}
const lamps = [];
for ( let y = 6; y > -8; y -= 6 ) {
    for ( let x = -18; x < 7; x +=3  ) {
        //console.log(x,y);
        const lamp = new Lamp(THREE);
        lamp.setPosition(x, y, -12);
        scene.add(lamp.actual);
        lamps.push(lamp);
    }
}

const clock = new THREE.Clock();

function animate(){    
    const dt = clock.getDelta();
    const elapsed = clock.getElapsedTime();
    
    for ( const lamp of lamps )
        lamp.update(dt);

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
