<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Monolith Garden - Prototype</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #081830;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js";
//import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/controls/OrbitControls.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x081830);

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(8, 6, 12);

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ---------------------------------------------------------------------
// Lights
// ---------------------------------------------------------------------

const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
dirLight.position.set(10, 10, 10);
scene.add(dirLight);

// ---------------------------------------------------------------------
// Ground
// ---------------------------------------------------------------------

const groundMat = new THREE.MeshStandardMaterial({
    color: 0x330000
});

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(100, 100),
    groundMat
);

ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;

scene.add(ground);

// ---------------------------------------------------------------------
// Monolith
// ---------------------------------------------------------------------

class Monolith {
    constructor(three, cfg) {
        this.lith = null;
        this.cfg = {...cfg};
        this.canvas = document.createElement("canvas");
        this.ctx = this.canvas.getContext("2d");
        this.lith = new three.Mesh(
            new three.BoxGeometry(cfg.width, cfg.height, cfg.depth),
            new three.MeshStandardMaterial({
                color: 0x000024
            })
        );
        this.lith.position.y = cfg.posY;
    }
    addGlyphs(g) {
        this.glyphs = g;
        this.glyphs.create(this.canvas, this.ctx);
    }
    renderGlyphs(three, scene) {
        this.glyphs.render(three, scene, this.canvas, this.cfg);
    }
    addToScene(scene) {
        scene.add(this.lith);
    }
}

class Glyphs {
    constructor(txt) {
        this.text = txt;
    }
    create(cnvs, ctx, txt) {
        cnvs.width = 256;
        cnvs.height = 1024;

        ctx.fillStyle = "rgba(0, 0, 0, 0)";
        ctx.fillRect(0, 0, cnvs.width, cnvs.height);

        ctx.font = "100px Kryptonian";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.shadowColor = "#00ff00";
        ctx.shadowBlur = 5;
        ctx.fillStyle = "#00ff00";

        ctx.save();
        ctx.translate(cnvs.width / 2, cnvs.height / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText(this.text, 0, 0);
        ctx.restore();
    }
    render(three, scene, cnvs, cfg) {
        const textTexture = new three.CanvasTexture(cnvs);

        const textMaterial = new three.MeshBasicMaterial({
            map: textTexture,
            transparent: true
        });

        this.textPlane = new three.Mesh(
           new three.PlaneGeometry(1.8, 7.2),
           textMaterial
        );

        this.textPlane.position.set(0, cfg.height / 2, 0.51);

        scene.add(this.textPlane);

    }
}

const monolith = new Monolith(THREE, { width: 4, height: 8, depth: 1, posX: 0, posY: 4, posZ: 0 });
monolith.addGlyphs(new Glyphs("REW"));
monolith.addToScene(scene);
monolith.renderGlyphs(THREE, scene);//, monolith.canvas, monolith.cfg);

// ---------------------------------------------------------------------
// Controls
// ---------------------------------------------------------------------

/*const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 4, 0);
controls.update();*/

// ---------------------------------------------------------------------
// Resize
// ---------------------------------------------------------------------

window.addEventListener("resize", () => {

    camera.aspect =
        window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

// ---------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------
const clock = new THREE.Clock();
function animate(timestamp) {
    const dt = clock.getDelta();

    requestAnimationFrame(animate);

    renderer.render(scene, camera);

}

animate(performance.now());

</script>

</body>
</html>
