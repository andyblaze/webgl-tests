<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Monolith Garden - Prototype</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #081830;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js";
//import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/controls/OrbitControls.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x081830);

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(8, 6, 12);

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ---------------------------------------------------------------------
// Lights
// ---------------------------------------------------------------------

const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// ---------------------------------------------------------------------
// Ground
// ---------------------------------------------------------------------

const groundMat = new THREE.MeshStandardMaterial({
    color: 0x330000
});

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(100, 100),
    groundMat
);

ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;

scene.add(ground);

// ---------------------------------------------------------------------
// Monolith
// ---------------------------------------------------------------------

const monolith = new THREE.Mesh(
    new THREE.BoxGeometry(4, 8, 1),
    new THREE.MeshStandardMaterial({
        color: 0x020023
    })
);

monolith.position.y = 4;
scene.add(monolith);

// ---------------------------------------------------------------------
// Neon Green Text Texture
// ---------------------------------------------------------------------

const canvas = document.createElement("canvas");
canvas.width = 312;
canvas.height = 1024;

const ctx = canvas.getContext("2d");

ctx.fillStyle = "rgba(0, 0, 0, 0)";
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.font = "190px DistrictThin";
ctx.textAlign = "center";
ctx.textBaseline = "middle";

ctx.shadowColor = "#00ff00";
ctx.shadowBlur = 10;

ctx.fillStyle = "#00ff00";

const text = "O";

ctx.save();
ctx.translate(canvas.width / 2, canvas.height / 2);
ctx.rotate(-Math.PI / 2);
ctx.fillText(text, 0, 0);
ctx.restore();

const textTexture = new THREE.CanvasTexture(canvas);

const textMaterial = new THREE.MeshBasicMaterial({
    map: textTexture,
    transparent: true
});

const textPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(1.8, 7.2),
    textMaterial
);

textPlane.position.set(0, 4, 0.51);

scene.add(textPlane);

// ---------------------------------------------------------------------
// Controls
// ---------------------------------------------------------------------

/*const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 4, 0);
controls.update();*/

// ---------------------------------------------------------------------
// Resize
// ---------------------------------------------------------------------

window.addEventListener("resize", () => {

    camera.aspect =
        window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

// ---------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------

function animate() {

    requestAnimationFrame(animate);

    renderer.render(scene, camera);

}

animate();

</script>

</body>
</html>
