<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cognitive Cell</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #000;
}

canvas {
    display: block;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.180/build/three.module.js";

//
// --------------------------------------------------------------------
// "Mind"
// --------------------------------------------------------------------
//

class Cell {
    constructor(three, aura) {
        this.position = new three.Vector3();
        this.aura = aura;
        this.color = new three.Color();
        this.curiosity = 0.9;
        this.caution = 0.2;
        this.creativity = 0.8;
        this.focus = 0.4;
        this.energy = 1.0;
    }
    move() {
        this.mist.position.copy(this.position);
        this.core.position.copy(this.position);
    }
    update(t) {
        // tiny "living" movement
        this.position.x = Math.sin(t * 0.35) * 0.4;
        this.position.y = Math.cos(t * 0.22) * 0.25;

        // slowly changing emotional state
        this.curiosity = 0.75 + Math.sin(t * 0.45) * 0.25;
        this.creativity = 0.75 + Math.cos(t * 0.27) * 0.25;
    }
    draw(t) {
        this.color.setRGB(
            0.6 * this.creativity + 0.8 * this.caution,
            0.25,
            0.7 * this.curiosity + 0.5 * this.creativity
        );

        this.mist.material.color.copy(this.color);

        //
        // Organic breathing        
        // 
        const pulse = 1.0 + Math.sin(t * 2.0) * 0.05 + Math.sin(t * 0.7) * 0.12;
        this.mist.scale.setScalar(2.8 * pulse);        
    }
}

//
// --------------------------------------------------------------------
// Scene
// --------------------------------------------------------------------
//

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);

camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.setClearColor(0x000000);

document.body.appendChild(renderer.domElement);

//
// --------------------------------------------------------------------
// Soft texture
// --------------------------------------------------------------------
//

function makeGlowTexture()
{
    const size = 128;

    const canvas = document.createElement("canvas");
    canvas.width = size;
    canvas.height = size;

    const ctx = canvas.getContext("2d");

    const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);

    g.addColorStop(0.00,"rgba(255, 255, 255, 1)");
    g.addColorStop(0.15,"rgba(255, 255, 255, 0.8)");
    g.addColorStop(0.40,"rgba(255, 255, 255, -.25)");
    g.addColorStop(1.00,"rgba(255, 255, 255, 0)");

    ctx.fillStyle = g;
    ctx.fillRect(0, 0, size, size);

    return new THREE.CanvasTexture(canvas);
}

const glow = makeGlowTexture();

//
// --------------------------------------------------------------------
// Mist
// --------------------------------------------------------------------
//
const mistMaterial = new THREE.SpriteMaterial({
    map: glow,
    transparent:true,
    blending:THREE.AdditiveBlending,
    depthWrite:false,
    color:new THREE.Color()
});

const mist = new THREE.Sprite(mistMaterial);
mist.scale.set(2, 2, 1);
scene.add(mist);

//
// Core
// --------------------------------------------------------------------
//
const coreMaterial = new THREE.SpriteMaterial({
    map: glow,
    transparent:true,
    blending:THREE.AdditiveBlending,
    depthWrite:false,
    color:0xffffff
});

const core = new THREE.Sprite(coreMaterial);
core.scale.set(0.18, 0.18, 1);
scene.add(core);

class Aura {
    constructor(a, c) {
        this.aura = a;
        this.core = c;
    }
    draw(t) {

    }
}
//
// --------------------------------------------------------------------
// Animation
// --------------------------------------------------------------------
//

const cell = new Cell(THREE, new Aura(mist, core));

const clock = new THREE.Clock();

function animate() {

    const t = clock.getElapsedTime();

    cell.update(t);
    cell.move();
    cell.draw(t);

    renderer.render(scene,camera);
    requestAnimationFrame(animate);
}

animate();

//
// --------------------------------------------------------------------
// Resize
// --------------------------------------------------------------------
//

addEventListener("resize",()=>{

    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(innerWidth,innerHeight);

});

</script>

</body>
</html>
