<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>WebGL Particle Emitter</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let points, geometry, material;

const MAX = 2000;

let positions, velocities, age, life;

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
  camera.position.z = 8;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // ----------------------------
  // PARTICLE DATA (CPU SIDE)
  // ----------------------------
  positions = new Float32Array(MAX * 3);
  velocities = new Float32Array(MAX * 3);
  age = new Float32Array(MAX);
  life = new Float32Array(MAX);

  for (let i = 0; i < MAX; i++) {
    respawn(i, true);
  }

  // ----------------------------
  // BUFFER GEOMETRY
  // ----------------------------
  geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute("aAge", new THREE.BufferAttribute(age, 1));
  geometry.setAttribute("aLife", new THREE.BufferAttribute(life, 1));

  // ----------------------------
  // SHADER MATERIAL
  // ----------------------------
  material = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {},
    vertexShader: `
      attribute float aAge;
      attribute float aLife;

      varying float vAlpha;

      void main() {
        vAlpha = 1.0 - (aAge / aLife);

        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);

        gl_PointSize = 6.0 * (1.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying float vAlpha;

      void main() {
        float d = length(gl_PointCoord - vec2(0.5));
        float alpha = smoothstep(0.5, 0.0, d) * vAlpha;

        gl_FragColor = vec4(0.7, 0.2, 1.0, alpha);
      }
    `
  });

  points = new THREE.Points(geometry, material);
  scene.add(points);

  window.addEventListener("resize", onResize);
}

function respawn(i) {
  const i3 = i * 3;

  // emit from origin
  positions[i3] = 0;
  positions[i3 + 1] = 0;
  positions[i3 + 2] = 0;

  // random direction but biased upward
  const angle = Math.random() * Math.PI * 2;
  const spread = Math.random() * 0.03; // horizontal spread

  const vx = Math.cos(angle) * spread * 0.08;
  const vz = Math.sin(angle) * spread * 0.04;

  // strong upward velocity + randomness
  const vy = 0.0003 + Math.random() * 0.004;

  velocities[i3]     = vx;
  velocities[i3 + 1] = vy;
  velocities[i3 + 2] = vz;

  age[i] = 0;
  life[i] = 60 + Math.random() * 80;
}

function animate() {
  requestAnimationFrame(animate);

  for (let i = 0; i < MAX; i++) {
    age[i]++;

    if (age[i] >= life[i]) {
      respawn(i);
      continue;
    }

    const i3 = i * 3;

    positions[i3]     += velocities[i3];
    positions[i3 + 1] += velocities[i3 + 1];
    positions[i3 + 2] += velocities[i3 + 2];

    // slight "buoyancy / fire drift"
    velocities[i3 + 1] += 0.0005;
  }

  geometry.attributes.position.needsUpdate = true;
  geometry.attributes.aAge.needsUpdate = true;

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
</script>

</body>
</html>
