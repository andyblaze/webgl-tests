<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Snake Trail Experiment</title>
<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#000;
}
canvas{
    display:block;
}
</style>
</head>
<body>
<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.180/build/three.module.js";

//==================================================
// CONFIG
//==================================================

const CFG = {
    maxPoints : 20,
    sampleDistance : 0.08,
    headLag : 0.15,
    headRadius : 0.18,
    tailRadius : 0.055,
    color : 0xaa44ff
};

//==================================================
// THREE
//==================================================

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);

camera.position.set(0, 0, 10);

const renderer = new THREE.WebGLRenderer({ antialias:true });

renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

//==================================================
// MOUSE
//==================================================

const mouse = new THREE.Vector3();

window.addEventListener("pointermove",(e)=>{

    mouse.x =
        (e.clientX/window.innerWidth)*2-1;

    mouse.y =
       -(e.clientY/window.innerHeight)*2+1;

    mouse.z = 0;

});

//==================================================
// DISC GEOMETRY
//==================================================

class Builder {
    constructor(three, cfg) {
        this.geo = new three.PlaneGeometry(1, 1);
        this.mat = new three.MeshBasicMaterial({
            color: cfg.color,
            transparent: true,
            opacity: 1,
            depthWrite: false,
            blending: three.AdditiveBlending,
            side: three.DoubleSide
        });
    }
    geometry() {
        return this.geo;
    }
    material() {
        return this.mat;
    }
}

//==================================================
// DISC POOL
//==================================================

class Points {
    constructor(cfg) {
        this.cfg = cfg;
        this.points = [];
    }
    init(three, geo, mat, scene) {
        for ( let i = 0; i < this.cfg.maxPoints; i++ ) {
            const m = new three.Mesh(geo, mat.clone());
            m.visible=false;
            scene.add(m);
            this.points.push(m);
        }        
    }
    update(three, camera, trail) {
        for( let i=0; i < this.points.length; i++ )
            this.points[i].visible = false;

        const n = trail.size;

        for( let i = 0; i < n; i++ ) {
            const mesh = this.points[i];
            mesh.visible = true;
            mesh.position.copy(trail.getPoint(i));
            mesh.quaternion.copy(camera.quaternion);

            const t = i / Math.max(1, n - 1);

            const r = three.MathUtils.lerp(this.cfg.headRadius, this.cfg.tailRadius, t);
            mesh.scale.setScalar(r);
            mesh.material.opacity = 1.0 - t;
        }
    }
    getDisc(i) {
        return this.points[i];
    }
}

class Movement {
    constructor(three) {
        this.raycaster = new three.Raycaster();
        this.desired = new three.Vector3();
        this.plane = new three.Plane(new three.Vector3(0, 0, 1), 0);        
    }
    update(mouse, camera, emitter, cfg) {
        this.raycaster.setFromCamera(mouse, camera);
        this.raycaster.ray.intersectPlane(this.plane, this.desired);
        emitter.lerp(this.desired, cfg.headLag);        
    }
}

class Trail {
    constructor() {
        this.trail = [];
    }
    addPoint(emitter, cfg) {
        if (  this.trail.length === 0 ) {
             this.trail.push(emitter.clone());
            return;
        }

        const last = this.trail[ this.trail.length - 1];

        if ( last.distanceTo(emitter) < cfg.sampleDistance )
            return;

         this.trail.push(emitter.clone());

        while (  this.trail.length > cfg.maxPoints ) {
             this.trail.shift();
        }        
    }
    get size() {
        return this.trail.length;
    }
    getPoint(p) {
        return this.trail[p];
    }
}

class Emitter {
    constructor(three, cfg, movement, trail) {
        this.emitter = new three.Vector3();
        this.cfg = cfg;
        this.movement = movement;
        this.trail = trail;
    }
    update(mouse, camera) {
        this.movement.update(mouse, camera, this.emitter, this.cfg);
        this.trail.addPoint(this.emitter, this.cfg);
    }
    get actual() {
        return this.emitter;
    }
}

const points = new Points(CFG);
const builder = new Builder(THREE, CFG);
points.init(THREE, builder.geometry(), builder.material(), scene);
const emitter = new Emitter(THREE, CFG, new Movement(THREE), new Trail());

//==================================================
// LOOP
//==================================================
const clock = new THREE.Clock();

function animate() {
    const dt = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    emitter.update(mouse, camera);
    points.update(THREE, camera, emitter.trail);

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

animate();

window.addEventListener(
    "resize",
    ()=>{

        camera.aspect=
            window.innerWidth/
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    });

</script>

</body>
</html>
