<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Snake Trail Experiment</title>
<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#000;
}
canvas{
    display:block;
}
</style>
</head>
<body>
<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.180/build/three.module.js";

//==================================================
// CONFIG
//==================================================

const CFG = {
    maxPoints : 20,
    sampleDistance : 0.08,
    headLag : 0.15,
    headRadius : 0.18,
    tailRadius : 0.055,
    color : 0xaa44ff
};

//==================================================
// THREE
//==================================================

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);

camera.position.set(0, 0, 10);

const renderer = new THREE.WebGLRenderer({ antialias:true });

renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

//==================================================
// MOUSE
//==================================================

const mouse = new THREE.Vector3();

window.addEventListener("pointermove",(e)=>{

    mouse.x =
        (e.clientX/window.innerWidth)*2-1;

    mouse.y =
       -(e.clientY/window.innerHeight)*2+1;

    mouse.z = 0;

});

//==================================================
// EMITTER
//==================================================

const emitter = new THREE.Vector3();

const desired = new THREE.Vector3();

//==================================================
// DISC GEOMETRY
//==================================================

class Builder {
    constructor(three, cfg) {
        this.geo = new three.PlaneGeometry(1, 1);
        this.mat = new three.MeshBasicMaterial({
            color: cfg.color,
            transparent: true,
            opacity: 1,
            depthWrite: false,
            blending: three.AdditiveBlending,
            side: three.DoubleSide
        });
    }
    geometry() {
        return this.geo;
    }
    material() {
        return this.mat;
    }
}
const builder = new Builder(THREE, CFG);

//==================================================
// DISC POOL
//==================================================

class Discs {
    constructor(cfg) {
        this.cfg = cfg;
        this.discs = [];
    }
    init(three, geo, mat, scene) {
        for ( let i = 0; i < this.cfg.maxPoints; i++ ) {
            const m = new three.Mesh(geo, mat.clone());
            m.visible=false;
            scene.add(m);
            this.discs.push(m);
        }        
    }
    update(three, camera, trail) {
        for( let i=0; i < this.discs.length; i++ )
            this.discs[i].visible = false;

        const n = trail.size;

        for( let i = 0; i < n; i++ ) {
            const mesh = this.discs[i];
            mesh.visible = true;
            mesh.position.copy(trail.getPoint(i));
            mesh.quaternion.copy(camera.quaternion);

            const t = i / Math.max(1, n - 1);

            const r = three.MathUtils.lerp(this.cfg.headRadius, this.cfg.tailRadius, t);
            mesh.scale.setScalar(r);
            mesh.material.opacity = 1.0 - t;
        }
    }
    getDisc(i) {
        return this.discs[i];
    }
}
const discs = new Discs(CFG);
discs.init(THREE, builder.geometry(), builder.material(), scene);

//==================================================
// HELPERS
//==================================================

const raycaster = new THREE.Raycaster();

const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

class Trail {
    constructor() {
        this.trail = [];
    }
    addPoint(emitter, cfg) {
        if (  this.trail.length === 0 ) {
             this.trail.push(emitter.clone());
            return;
        }

        const last = this.trail[ this.trail.length - 1];

        if ( last.distanceTo(emitter) < cfg.sampleDistance )
            return;

         this.trail.push(emitter.clone());

        while (  this.trail.length > cfg.maxPoints ) {
             this.trail.shift();
        }        
    }
    get size() {
        return this.trail.length;
    }
    getPoint(p) {
        return this.trail[p];
    }
}
const trail = new Trail();

function updateEmitter() {
    raycaster.setFromCamera(mouse,camera);
    raycaster.ray.intersectPlane(plane, desired);
    emitter.lerp(desired, CFG.headLag);
}

//==================================================
// LOOP
//==================================================

function animate(){
    requestAnimationFrame(animate);

    updateEmitter();
    trail.addPoint(emitter, CFG);
    discs.update(THREE, camera, trail);

    renderer.render(scene, camera);
}

animate();

window.addEventListener(
    "resize",
    ()=>{

        camera.aspect=
            window.innerWidth/
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    });

</script>

</body>
</html>
