<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three.js Sky Dome Demo</title>

<style>
html, body {
    margin:0;
    overflow:hidden;
    background:black;
}

canvas {
    display:block;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.179.1/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    10000
);

//camera.position.set(0,3,0);
camera.position.set(0, 10, 0);
const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);

//
// Lighting
//

scene.add(new THREE.HemisphereLight(0x99bbff,0x222222,1.2));

const sun = new THREE.DirectionalLight(0xffffff,0.7);
sun.position.set(5,10,4);
scene.add(sun);

//
// Ground
//

class Planet {
    constructor(three) {

        this.group = new three.Group();

        this.radius = 4000;

const texture = new three.TextureLoader().load("oce.jpg");

texture.wrapS = three.RepeatWrapping;
texture.wrapT = three.RepeatWrapping;

texture.repeat.set(14, 12);

this.surface = new three.Mesh(
    new three.SphereGeometry(this.radius, 128, 64),
    new three.MeshLambertMaterial({
        map: texture
    })
);

        /*this.surface = new three.Mesh(
            new three.SphereGeometry(this.radius, 128, 64),
            new three.MeshLambertMaterial({
                color: 0x00ff00
            })
        );*/

        this.group.add(this.surface);

        // Camera starts above the north pole, so move the
        // whole planet down by its radius.
        this.group.position.y = -this.radius;
    }

    addToScene(scene) {
        scene.add(this.group);
    }

    update(camera) {
const metresTravelled = camera.position.x;

const angle = metresTravelled / this.radius;

this.group.rotation.x += 0.0001;

    }
}



//
// Fog
//

/*scene.fog = new THREE.Fog(
    0x0b1022,
    150,
    1200
);*/

renderer.setClearColor(0x0b1022);

//
// Sky dome
//

class SkyDome {
    constructor(three, decor) {
        this.group = new three.Group();
        this.group.add(decor.actual);

        const geometry = new three.SphereGeometry(1500, 64, 32);
        const material = new three.ShaderMaterial({
            side: three.BackSide,
            uniforms:{
                topColor :{ value: new three.Color(0x020206) },
                bottomColor :{ value: new three.Color(0x153d80) }
            },
            vertexShader :`
                varying vec3 vPosition;
                void main() {
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
                }`,

            fragmentShader :`
                varying vec3 vPosition;

                uniform vec3 topColor;
                uniform vec3 bottomColor;

                void main() {
                    float h = normalize(vPosition).y * 0.5 + 0.5;
                    vec3 colour = mix(bottomColor, topColor, smoothstep(0.0,1.0,h));
                    gl_FragColor = vec4(colour,1.0);
                }`

        });
        this.group.add(new three.Mesh(geometry, material));
    }
    copyPosition(p) {
        this.group.position.copy(p);
    }
    addToScene(scene) {
        scene.add(this.group);
    }
}

//
// Stars
//

class StarsDecor {
    constructor(three, numStars) {
        this.STAR_COUNT = numStars;
        this.positions = [];
        this.colours = [];
        this.radius = 1450;

        for ( let i =0 ; i < this.STAR_COUNT; i++ ) {

            const u = Math.random();
            const v = Math.random();

            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);

            const x = this.radius * Math.sin(phi) * Math.cos(theta);
            const y = this.radius * Math.cos(phi);
            const z = this.radius * Math.sin(phi) * Math.sin(theta);
            this.positions.push(x, y, z);

            const b = 0.65 + Math.random() * 0.35;
            this.colours.push(b, b, b);

        }

        const geometry = new three.BufferGeometry();
        geometry.setAttribute("position", new three.Float32BufferAttribute(this.positions, 3));
        geometry.setAttribute("color", new three.Float32BufferAttribute(this.colours, 3));

        const material = new THREE.PointsMaterial({
            size:2,
            sizeAttenuation:false,
            vertexColors:true
        });

        this.stars = new three.Points(geometry, material);
    }
    get actual() {
        return this.stars;
    }
    copyPosition(p) {
        this.stars.position.copy(p);
    }    
    addToScene(scene) {
        scene.add(this.stars);
    }
}

const sky = new SkyDome(THREE, new StarsDecor(THREE, 2000));
sky.addToScene(scene);

const planet = new Planet(THREE);
planet.addToScene(scene);

//
// Animation
//

function animate()
{

    requestAnimationFrame(animate);

    //camera.position.z -= 0.30;
    // Keep the grid centred on the camera
    planet.update(camera);
//grid.position.x = Math.round(camera.position.x / 20) * 20;
//grid.position.z = Math.round(camera.position.z / 20) * 20;

    //
    // Keep the sky centred on the camera
    //

    //sky.copyPosition(camera.position);
    //stars.copyPosition(camera.position);

    renderer.render(scene,camera);

}

animate();

//
// Resize
//

window.addEventListener("resize",()=>{

    camera.aspect =
        window.innerWidth /
        window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

</script>

</body>
</html>
