<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three.js Sky Dome Demo</title>

<style>
html, body {
    margin:0;
    overflow:hidden;
    background:black;
}

canvas {
    display:block;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.179.1/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    10000
);

camera.position.set(0,3,0);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);

//
// Lighting
//

scene.add(new THREE.HemisphereLight(0x99bbff,0x222222,1.2));

const sun = new THREE.DirectionalLight(0xffffff,0.7);
sun.position.set(5,10,4);
scene.add(sun);

//
// Ground
//

class Planet {
    constructor(three) {
        this.ground = new three.Mesh(
            new three.PlaneGeometry(5000,5000),
            new three.MeshLambertMaterial({ color:0x1d1d1d })
        );
        this.ground.rotation.x = -Math.PI/2;
        this.grid = new three.GridHelper(
            5000,      // overall size
            250,       // divisions (20 units apart)
            0x5070c0,  // major line colour
            0x304060   // minor line colour
        );
        this.grid.position.y = 0.02;      // just above the ground        
    }
    addToScene(scene) {
        scene.add(this.ground);
        scene.add(this.grid);
    }
    move(camera) {
        this.grid.position.x = Math.round(camera.position.x / 20) * 20;
        this.grid.position.z = Math.round(camera.position.z / 20) * 20;
    }
}

const planet = new Planet(THREE);
planet.addToScene(scene);


//
// Fog
//

/*scene.fog = new THREE.Fog(
    0x0b1022,
    150,
    1200
);*/

renderer.setClearColor(0x0b1022);

//
// Sky dome
//

const skyGeometry = new THREE.SphereGeometry(1500,64,32);

const skyMaterial = new THREE.ShaderMaterial({

    side:THREE.BackSide,

    uniforms:{

        topColor:{
            value:new THREE.Color(0x020206)
        },

        bottomColor:{
            value:new THREE.Color(0x153d80)
        }

    },

    vertexShader:`

        varying vec3 vPosition;

        void main(){

            vPosition = position;

            gl_Position =
                projectionMatrix *
                modelViewMatrix *
                vec4(position,1.0);

        }

    `,

    fragmentShader:`

        varying vec3 vPosition;

        uniform vec3 topColor;
        uniform vec3 bottomColor;

        void main(){

            float h =
                normalize(vPosition).y * 0.5 + 0.5;

            vec3 colour =
                mix(
                    bottomColor,
                    topColor,
                    smoothstep(0.0,1.0,h)
                );

            gl_FragColor =
                vec4(colour,1.0);

        }

    `

});

const sky = new THREE.Mesh(
    skyGeometry,
    skyMaterial
);

scene.add(sky);

//
// Stars
//

const STAR_COUNT = 3500;

const positions = [];
const colours = [];

const radius = 1450;

for(let i=0;i<STAR_COUNT;i++)
{

    const u = Math.random();
    const v = Math.random();

    const theta = 2*Math.PI*u;
    const phi = Math.acos(2*v-1);

    const x =
        radius *
        Math.sin(phi) *
        Math.cos(theta);

    const y =
        radius *
        Math.cos(phi);

    const z =
        radius *
        Math.sin(phi) *
        Math.sin(theta);

    positions.push(x,y,z);

    const b = 0.65 + Math.random()*0.35;

    colours.push(b,b,b);

}

const starGeometry = new THREE.BufferGeometry();

starGeometry.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(
        positions,
        3
    )
);

starGeometry.setAttribute(
    "color",
    new THREE.Float32BufferAttribute(
        colours,
        3
    )
);

const starMaterial = new THREE.PointsMaterial({

    size:2,

    sizeAttenuation:false,

    vertexColors:true

});

const stars =
    new THREE.Points(
        starGeometry,
        starMaterial
    );

scene.add(stars);

//
// Animation
//

function animate()
{

    requestAnimationFrame(animate);

    camera.position.z -= 0.30;
    // Keep the grid centred on the camera
    planet.move(camera);
//grid.position.x = Math.round(camera.position.x / 20) * 20;
//grid.position.z = Math.round(camera.position.z / 20) * 20;

    //
    // Keep the sky centred on the camera
    //

    sky.position.copy(camera.position);
    stars.position.copy(camera.position);

    renderer.render(scene,camera);

}

animate();

//
// Resize
//

window.addEventListener("resize",()=>{

    camera.aspect =
        window.innerWidth /
        window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

</script>

</body>
</html>
