<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Glowing Cube</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #000;
}

canvas {
    display: block;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.179.1/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    100
);

camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);



// ambient fill

scene.add(
    new THREE.AmbientLight(0xffffff, 0.15)
);



// cube materials

const materials = [

    new THREE.MeshPhysicalMaterial({
        color: 0xff4444,
        transparent: true,
        opacity: 0.530,
        side: THREE.DoubleSide
    }),

    new THREE.MeshPhysicalMaterial({
        color: 0x44ff44,
        transparent: true,
        opacity: 0.635,
        side: THREE.DoubleSide
    }),

    new THREE.MeshPhysicalMaterial({
        color: 0x4444ff,
        transparent: true,
        opacity: 0.825,
        side: THREE.DoubleSide
    }),

    new THREE.MeshPhysicalMaterial({
        color: 0xffff44,
        transparent: true,
        opacity: 0.740,
        side: THREE.DoubleSide
    }),

    new THREE.MeshPhysicalMaterial({
        color: 0xff44ff,
        transparent: true,
        opacity: 0.820,
        side: THREE.DoubleSide
    }),

    new THREE.MeshPhysicalMaterial({
        color: 0x44ffff,
        transparent: true,
        opacity: 0.945,
        side: THREE.DoubleSide
    })
];

const cube = new THREE.Mesh(
    new THREE.BoxGeometry(2, 2, 2),
    materials
);

scene.add(cube);



// inner light

const innerLight = new THREE.PointLight(
    0xffffff,
    50,
    20
);

cube.add(innerLight);



// glowing core

const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 24, 24),
    new THREE.MeshBasicMaterial({
        color: 0xffffff
    })
);

cube.add(core);



// subtle outer light

scene.add(
    new THREE.PointLight(
        0xffffff,
        0.5,
        50
    )
);



// animation

const clock = new THREE.Clock();

function animate() {

    requestAnimationFrame(animate);

    const t = clock.getElapsedTime();

    // Non-repeating motion
    cube.rotation.x =
        t * 0.43 +
        Math.sin(t * 0.71) * 0.35;

    cube.rotation.y =
        t * 0.29 +
        Math.cos(t * 0.53) * 0.45;

    cube.rotation.z =
        t * 0.17 +
        Math.sin(t * 0.37) * 0.25;

    // slight light pulsing

    innerLight.intensity =
        45 + Math.sin(t * 2.0) * 8;

    core.scale.setScalar(
        1 + Math.sin(t * 3.0) * 0.1
    );

    renderer.render(scene, camera);
}

animate();



window.addEventListener("resize", () => {

    camera.aspect =
        window.innerWidth /
        window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

</script>

</body>
</html>
