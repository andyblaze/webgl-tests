<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ground Plane Test</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}
canvas {
    display: block;
}
</style>
</head>
<body>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js";

export default class DeltaReport {
    static lastTime = performance.now();
    static startTime = performance.now();
    static frameCount = 0;
    static sum = 0;
    static min = Infinity;
    static max = 0;
    static timeSum = 0; // total ms of frame times (not normalised)
    static fps = 0;
    static fpsEl = null;
    static running = true;
    //static running = false;

    static spew() {
        console.log(Math.random());
    }

    static reset() {
        this.frameCount = 0;
        this.sum = 0;
        this.timeSum = 0;
    }

    static calc(timestamp) {        
        const deltaTime = timestamp - this.lastTime; // ms since last frame
        const delta = deltaTime / 16.67; // normalised to 60fps

        this.sum += delta;
        this.timeSum += deltaTime;
        this.lastTime = timestamp;

        this.fps = parseInt(60 / (this.sum / this.frameCount));
        if ( this.fps < this.min ) this.min = this.fps; 
        if ( this.fps > this.max ) this.max = this.fps; 

        const avgFrameTime = this.timeSum / this.frameCount; // ms
        const totalSeconds = Math.floor((timestamp - this.startTime) / 1000);
        const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, "0");
        const seconds = (totalSeconds % 60).toString().padStart(2, "0");
        const elapsed = minutes + ":" + seconds;
        return [ avgFrameTime, elapsed ];
    }

    static display(timestamp, htmlId) {
        if ( this.fpsEl === null ) this.fpsEl = htmlId;
        this.frameCount++;
        if (this.frameCount === 120) {
            DeltaReport.calc(timestamp);  
            this.fpsEl.innerText = this.fps;

            // Clear any previous fps-* class
            this.fpsEl.classList.remove("fps-best", "fps-ok", "fps-bad");

            // Add class based on fps
            if (this.fps >= 55) {
                this.fpsEl.classList.add("fps-best");
            } else if (this.fps >= 40) {
                this.fpsEl.classList.add("fps-ok");
            } else {
                this.fpsEl.classList.add("fps-bad");
            }
            DeltaReport.reset();
        }
    }

    static log(timestamp) { 
        if ( false === DeltaReport.running ) return;
        this.frameCount++;
        if (this.frameCount === 120) { // ~2 seconds at 60fps
            const [avgFrameTime, elapsed] = DeltaReport.calc(timestamp);        

            console.log(
                "fps", this.fps,
                "min=", this.min,
                "max=", this.max,
                "avgFrame=", avgFrameTime.toFixed(2) + "ms",
                "elapsed=", elapsed
            );
            DeltaReport.reset();
        }
    }
}


//
// Scene
//
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

//
// Camera
//
const camera = new THREE.PerspectiveCamera(
    44,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(0, 11, 20);
camera.lookAt(0, 0, 0);

//
// Renderer
//
const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

//
// Light
//
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(10, 20, 10);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

//
// Ground Plane
//
const meshSize = 140;
const plane = new THREE.Mesh(
    new THREE.PlaneGeometry(
        meshSize,   // width
        meshSize,   // height
        meshSize,   // width segments
        meshSize    // height segments
    ),
    new THREE.MeshBasicMaterial({
        color: 0x00ff00,
        wireframe: true
    })
);

//
// Make it horizontal
//
plane.rotation.x = -Math.PI / 2;

scene.add(plane);

//
// Create two gravity wells
//


class GravityWell {
    constructor(x, y, z, st, sp, d, c) {
        this.x = x;
        this.y = y;
        this.z = z;
        this.strength = -st;
        this.spread = sp;
        this.divisor = d;
        this.constant = c;
    }
    influence(ox, oy, oz) {
        const dx = ox - this.x;
        const dy = oy - this.y;
        const distanceSquared = (dx * dx) + (dy * dy);
        return this.strength * Math.exp(-distanceSquared / this.spread);
    }
    update(t) {
        this.x = Math.sin(t / this.divisor) * this.constant;
    }
}

const wells = [
    new GravityWell(0, 0, 0, 9, 40, 3000, 11),
    new GravityWell(20, 10, 0, 4, 30, 2000, 7),
    new GravityWell(30, 20, 0, 5, 30, 2500, 6)
];

const positions = plane.geometry.attributes.position;

function updateMesh(t) {    

    for (let i = 0; i < positions.count; i++) {
        let height = 0;

        const ox = positions.getX(i);
        const oy = positions.getY(i);
        const oz = positions.getZ(i);

        for ( let w = 0; w < wells.length; w++ ) {
            const well = wells[w];
            well.update(t);
            height += well.influence(ox, oy, oz);
        }
        positions.setZ(i, height);
    }

    positions.needsUpdate = true;
}
//
// Render
//
function animate(timestamp) {
    requestAnimationFrame(animate);

    //updateWells();   // optional
    updateMesh(timestamp);    // your current loop

    renderer.render(scene, camera);
    DeltaReport.log(timestamp);
}

animate(performance.now());


//
// Resize
//
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
