<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Textured Torus</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
  // --- Scene ---
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    100
  );
  camera.position.z = 4;

  const renderer = new THREE.WebGLRenderer({
    antialias: true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x000000, 1);
  document.body.appendChild(renderer.domElement);

  // --- Texture ---
  const loader = new THREE.TextureLoader();
  const tex = loader.load('t1.jpg');
  tex.colorSpace = THREE.SRGBColorSpace;

  // Important for clean wrap on curved surface
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, 1);

  const material = new THREE.MeshBasicMaterial({
    map: tex
  });

  // --- Torus geometry ---
  const geometry = new THREE.TorusGeometry(1.2, 0.5, 32, 100);

  const torus = new THREE.Mesh(geometry, material);
  scene.add(torus);

  // --- Motion ---
  let vx = 0.003;
  let vy = 0.002;

  function animate() {
    requestAnimationFrame(animate);

    // slow drift rotation (slightly organic)
    vx += (Math.random() - 0.5) * 0.0001;
    vy += (Math.random() - 0.5) * 0.0001;

    vx = THREE.MathUtils.clamp(vx, -0.01, 0.01);
    vy = THREE.MathUtils.clamp(vy, -0.01, 0.01);

    torus.rotation.x += vx;
    torus.rotation.y += vy;

    renderer.render(scene, camera);
  }

  animate();

  // --- resize ---
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
