<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cube Net Composer</title>
<link href="css/site.css" rel="stylesheet" type="text/css">
</head>
<body>

<div id="wrap">
    <div id="stage">
        <img src="t5.jpg" id="srcImg" />
    </div>
    <div id="net">
        <table>
            <tr><td></td><td class="face ft"></td><td></td></tr>
            <tr><td class="face fl"></td><td class="face f"></td><td class="face fr"></td></tr>
            <tr><td></td><td class="face fb"></td><td></td></tr>
            <tr><td></td><td class="face fe"></td><td></td></tr>
        </table>
    </div>
</div>

<div id="ui">
    <label>
        Scale
        <input id="scale" type="range" min="0" max="3" step="0.01" value="1" data-lbl="lbl-s">
    </label><br><div id="lbl-s"></div>

    <label>
        X
        <input id="x" type="range" min="0" max="300" step="1" value="0" data-lbl="lbl-x">
    </label><br><div id="lbl-x"></div>

    <label>
        Y
        <input id="y" type="range" min="0" max="300" step="1" value="0" data-lbl="lbl-y">
    </label><br><div id="lbl-y"></div>

    <label>
        Rotation (90°)
        <input id="rot" type="range" min="0" max="3" step="1" value="0">
    </label><br>

    <button id="go">GO</button>
    <br><div id="scales"></div>
</div>

<script type="text/javascript" src="js/main.js"></script>

</body>
</html>
