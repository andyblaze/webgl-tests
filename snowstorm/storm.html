<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hail Prototype</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: rgb(10, 10, 14);
    }
    body {
        background-image: url(bg.jpg);
        background-size: cover;
    }
    #wrap {
        display: block;        
        position: relative;        
        width: 100vw;
        height: 100vh;            
    }

    #snow, #sky {
        display: block;
        background-color: transparent;
        position: absolute;
        left: 0; top: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }
</style>
</head>

<body>

<div id="wrap">
    <canvas id="snow"></canvas>
    <canvas id="sky"></canvas>
</div>

<script>
const glConfig = {
    cloudHeight: 0.7, // top % of screen
    opacity: 0.25,     // 5% max
    noiseScale: 90,
    driftSpeedX: -4,
    driftSpeedY: 2
};

const glCanvas = document.getElementById("sky");

const gl = glCanvas.getContext("webgl", {
    alpha: true,
    premultipliedAlpha: false
});

function glResize(w, h) {
    glCanvas.width = w;
    glCanvas.height = h;
    gl.viewport(0, 0, w, h);
}

const vertexSource = `
attribute vec2 aPos;
void main() {
    gl_Position = vec4(aPos,0.0,1.0);
}`;

const fragmentSource = `
precision mediump float;

uniform vec2 uResolution;
uniform float uTime;

uniform float uOpacity;
uniform float uCloudHeight;
uniform float uNoiseScale;
uniform vec2 uDrift;

float hash(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
}

float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);

    float a = hash(i);
    float b = hash(i + vec2(1.0,0.0));
    float c = hash(i + vec2(0.0,1.0));
    float d = hash(i + vec2(1.0,1.0));

    vec2 u = f * f * (3.0 - 2.0 * f);

    return mix(a,b,u.x)
         + (c-a)*u.y*(1.0-u.x)
         + (d-b)*u.x*u.y;
}

void main() {
    vec2 uv = gl_FragCoord.xy / uResolution.xy;

    vec2 p = uv * uNoiseScale;

    p += uDrift * uTime;

    float n = noise(p);
    n = smoothstep(0.35, 0.75, n);

    float topFade = 1.0 - smoothstep(0.0, uCloudHeight, 1.0 - uv.y);

    float alpha = n * topFade * uOpacity;

    gl_FragColor = vec4(1.0, 1.0, 1.0, alpha);
}`;

function compile(type, src) {
    const s = gl.createShader(type);

    gl.shaderSource(s, src);
    gl.compileShader(s);

    return s;
}

const vs = compile( gl.VERTEX_SHADER, vertexSource);
const fs = compile(gl.FRAGMENT_SHADER, fragmentSource);
const program = gl.createProgram();

gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
gl.useProgram(program);

const verts = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

const pos = gl.getAttribLocation(program, "aPos");
gl.enableVertexAttribArray(pos);
gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

const uResolution = gl.getUniformLocation(program, "uResolution");
const uTime = gl.getUniformLocation(program, "uTime");
const uOpacity = gl.getUniformLocation(program, "uOpacity");
const uCloudHeight = gl.getUniformLocation(program, "uCloudHeight");
const uNoiseScale = gl.getUniformLocation(program, "uNoiseScale");
const uDrift = gl.getUniformLocation(program, "uDrift");

gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

</script>

<script type="module" src="js/main.js"></script>

</body>
</html>
