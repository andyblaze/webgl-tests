<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Winter Overlay</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;

    background-image: url(bg.jpg);
    background-size: cover;
    background-position: center;
}

canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}
</style>
</head>
<body>

<canvas id="gl"></canvas>

<script>
const glConfig = {

    cloudHeight: 0.45, // top 45% of screen

    opacity: 0.25,     // 5% max

    noiseScale: 90,

    driftSpeedX: -4,
    driftSpeedY: 2
};

const canvas = document.getElementById("gl");

const gl = canvas.getContext("webgl", {
    alpha: true,
    premultipliedAlpha: false
});

function resize() {

    canvas.width = innerWidth;
    canvas.height = innerHeight;

    gl.viewport(
        0,
        0,
        canvas.width,
        canvas.height
    );
}

window.addEventListener("resize", resize);
resize();

const vertexSource = `
attribute vec2 aPos;

void main() {
    gl_Position = vec4(aPos,0.0,1.0);
}
`;

const fragmentSource = `
precision mediump float;

uniform vec2 uResolution;
uniform float uTime;

uniform float uOpacity;
uniform float uCloudHeight;
uniform float uNoiseScale;
uniform vec2 uDrift;

float hash(vec2 p)
{
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
}

float noise(vec2 p)
{
    vec2 i = floor(p);
    vec2 f = fract(p);

    float a = hash(i);
    float b = hash(i + vec2(1.0,0.0));
    float c = hash(i + vec2(0.0,1.0));
    float d = hash(i + vec2(1.0,1.0));

    vec2 u = f * f * (3.0 - 2.0 * f);

    return mix(a,b,u.x)
         + (c-a)*u.y*(1.0-u.x)
         + (d-b)*u.x*u.y;
}

void main()
{
    vec2 uv = gl_FragCoord.xy / uResolution.xy;

    vec2 p = uv * uNoiseScale;

    p += uDrift * uTime;

    float n = noise(p);

    n = smoothstep(
        0.35,
        0.75,
        n
    );

    float topFade =
    1.0 -
    smoothstep(
        0.0,
        uCloudHeight,
        1.0 - uv.y
    );

    float alpha =
        n *
        topFade *
        uOpacity;

    gl_FragColor =
        vec4(
            1.0,
            1.0,
            1.0,
            alpha
        );
}
`;

function compile(type, src)
{
    const s = gl.createShader(type);

    gl.shaderSource(s, src);
    gl.compileShader(s);

    return s;
}

const vs = compile(
    gl.VERTEX_SHADER,
    vertexSource
);

const fs = compile(
    gl.FRAGMENT_SHADER,
    fragmentSource
);

const program = gl.createProgram();

gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);

gl.useProgram(program);

const verts = new Float32Array([
    -1,-1,
     1,-1,
    -1, 1,
     1, 1
]);

const buffer = gl.createBuffer();

gl.bindBuffer(
    gl.ARRAY_BUFFER,
    buffer
);

gl.bufferData(
    gl.ARRAY_BUFFER,
    verts,
    gl.STATIC_DRAW
);

const pos =
    gl.getAttribLocation(
        program,
        "aPos"
    );

gl.enableVertexAttribArray(pos);

gl.vertexAttribPointer(
    pos,
    2,
    gl.FLOAT,
    false,
    0,
    0
);

const uResolution =
    gl.getUniformLocation(
        program,
        "uResolution"
    );

const uTime =
    gl.getUniformLocation(
        program,
        "uTime"
    );

const uOpacity =
    gl.getUniformLocation(
        program,
        "uOpacity"
    );

const uCloudHeight =
    gl.getUniformLocation(
        program,
        "uCloudHeight"
    );

const uNoiseScale =
    gl.getUniformLocation(
        program,
        "uNoiseScale"
    );

const uDrift =
    gl.getUniformLocation(
        program,
        "uDrift"
    );

gl.enable(gl.BLEND);

gl.blendFunc(
    gl.SRC_ALPHA,
    gl.ONE_MINUS_SRC_ALPHA
);

function drawGl(gl, t) {
t *= 0.001;

    gl.clearColor(
        0,
        0,
        0,
        0
    );

    gl.clear(
        gl.COLOR_BUFFER_BIT
    );

    gl.uniform2f(
        uResolution,
        canvas.width,
        canvas.height
    );

    gl.uniform1f(
        uTime,
        t
    );

    gl.uniform1f(
        uOpacity,
        glConfig.opacity
    );

    gl.uniform1f(
        uCloudHeight,
        glConfig.cloudHeight
    );

    gl.uniform1f(
        uNoiseScale,
        glConfig.noiseScale
    );

    gl.uniform2f(
        uDrift,
        glConfig.driftSpeedX,
        glConfig.driftSpeedY
    );

    gl.drawArrays(
        gl.TRIANGLE_STRIP,
        0,
        4
    );
}

function animate(t)
{
    drawGl(gl, t);

    requestAnimationFrame(
        animate
    );
}

requestAnimationFrame(
    animate
);

</script>

</body>
</html>
