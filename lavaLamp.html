<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lava Lamp - Part 1</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#fff;
}
canvas {
    background:transparent;
}
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

function makeCamera() {
    const cam = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100
    );
    cam.position.z = 12;
    return cam;
}

function makeRenderer() {
    const rdr = new THREE.WebGLRenderer({
        antialias:true
    });
    rdr.setSize(window.innerWidth, window.innerHeight);
    return rdr;
}

function makeLights(scene) {
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(5, 10, 10);
    scene.add(light);
}

class Blob {
    constructor(three, sz) {
        this.blb = new three.Mesh(
        new three.SphereGeometry(sz, 48, 48),
            new three.MeshStandardMaterial({
                color:0xff5500,
                emissive:0xaa2200,
                emissiveIntensity: 0.8,
                roughness:0.35
            })
        );
        this.blb.position.y = 0;
    }
    update(v) {
        const stretch = 1 + Math.abs(v) * 32;
        this.blb.scale.y = stretch;
        this.blb.scale.x = 1 / Math.sqrt(stretch);
        this.blb.scale.z = 1 / Math.sqrt(stretch);
    }
    get posY() {
        return this.blb.position.y;
    }
    set posY(y) {
        this.blb.position.y = y;
    }
    get actual() {
        return this.blb;
    }
}

function clamp(mn, mx, val) {
    return Math.max(mn, Math.min(mx, val));
}

function smoothstep(edge0, edge1, x) {
    const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
    return t * t * (3 - 2 * t);
}

const scene = new THREE.Scene();

const camera = makeCamera();
const renderer = makeRenderer(); 
document.body.appendChild(renderer.domElement);

makeLights(scene);

class Lamp {
    constructor(three) {
        this.height = 4;
        this.group = new three.Group();
        
        this.blob = new Blob(three, 0.25);
        this.group.add(this.blob.actual);

        const glassGeometry = new three.CylinderGeometry(0.32, 0.8, this.height);
        const glassMaterial = new three.MeshPhysicalMaterial({
            transmission: 0.371,
            transparent: true,
            opacity: 0.102492,
            roughness: 0.8,
            thickness: 0.8,
        });

        this.glass = new three.Mesh(glassGeometry, glassMaterial);
        this.group.add(this.glass);

        const capGeo = new  three.CylinderGeometry(0.32, 0.38, 0.5);
        const baseGeo = new  three.CylinderGeometry(0.8, 0.6, 0.5, 32, 1, true);
        const steelMat = new  three.MeshPhysicalMaterial({
            color: 0xb8bcc2,
            metalness: 1.0,
            roughness: 0.28,
        });

        this.cap = new  three.Mesh(capGeo, steelMat);
        this.cap.position.y = this.height - 2.2;
        this.group.add(this.cap);

        this.base = new  three.Mesh(baseGeo, steelMat);
        this.base.position.y = -(this.height - 1.8);
        this.group.add(this.base);
        
        this.lamplight = new three.PointLight(0xff6600, 100, 4);
        this.lamplight.position.y = -(this.height - 1.6);
        this.group.add(this.lamplight);
        
    }
    setPosition(x, y, z) {
        this.group.position.x = x;
        this.group.position.y = y;
        this.group.position.z = z;
    }
    update(dt) {
        velocity = this.physics(this.blob, dt);
        this.blob.update(velocity);
    }
    physics(blob, dt) {
        let targetTemp = temperature; // placeholder for now

        if (blob.posY < bottom)
            targetTemp += heatRate * dt;

        if (blob.posY > top)
            targetTemp -= coolRate * dt;

        temperature += (targetTemp - temperature) * 0.15;
        temperature = clamp(0, 1, temperature);
        // Bottom heater
        /*if (blob.posY < bottom)
            temperature += heatRate * dt;
        // Top cooling
        if (blob.posY > top)
            temperature -= coolRate * dt;
        temperature = clamp(0, 1, temperature);*/

        // Buoyancy
        const buoyancy = (temperature - 0.5) * buoyancyFactor;
        velocity += buoyancy;
        // 🧪 NEW: fake boundary density layer
        let boundaryFactor = 1.0;
        // bottom zone
        if (blob.posY < bottom + boundaryZone) {
            const t = (blob.posY - bottom) / boundaryZone; // 0..1
            boundaryFactor *= (boundaryDamping + (1 - boundaryDamping) * t);
        }
        // top zone
        if (blob.posY > top - boundaryZone) {
            const t = (top - blob.posY) / boundaryZone; // 0..1
            boundaryFactor *= (boundaryDamping + (1 - boundaryDamping) * t);
        }
        // Drag (now boundary-aware)
        velocity *= Math.exp(-drag * dt) * boundaryFactor;
        blob.posY += velocity;
        // Reset cycle (keep your logic)
        if (blob.posY > top && velocity > 0)
            velocity *= 0.98;

        if (blob.posY < bottom && velocity < 0)
            velocity *= 0.98;
        return velocity;
    }
    get actual() {
        return this.group;
    }
}
const lamps = [];

const lamp1 = new Lamp(THREE);
lamp1.setPosition(-14, 4, -6);
scene.add(lamp1.actual);

const lamp2 = new Lamp(THREE);
lamp2.setPosition(-11, 4, -6);
scene.add(lamp2.actual);

lamps.push(lamp1); lamps.push(lamp2);

let temperature = 0;
let velocity = 0;

const heatRate = 2.65;
const coolRate = 2.85;
const drag = 50;
const buoyancyFactor = 0.02;
const top = 1.8;
const bottom = -2;
const boundaryZone = 0.4;   // how far from top/bottom it affects
const boundaryDamping = 0.1; // how strong the slowdown is

const clock = new THREE.Clock();

function animate(){    
    const dt = clock.getDelta();
    const elapsed = clock.getElapsedTime();
    
    for ( const l of lamps )
        l.update(dt);

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
