<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hail Prototype</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: rgb(10, 10, 14);
    }

    canvas {
        display: block;
    }
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script type="text/javascript">
//
// ======================================================
// HELPERS
// ======================================================
//
function mt_randf(min, max) {
    return min + Math.random() * (max - min);
}

function mt_rand(min, max) {
    return Math.floor(mt_randf(min, max + 1));
}
//
// ======================================================
// CONFIG
// ======================================================
//
class Config {

    constructor() {

        // physics
        this.gravity = 0.15;
        this.airDrag = 0.01;

        // spawning
        this.spawnRate = 6;         // particles per frame
        this.maxParticles = 20;

        // hail sizes
        this.minRadius = 2;
        this.maxRadius = 12;

        // velocity
        this.minFallSpeed = 1;
        this.maxFallSpeed = 4;

        // bounce
        this.bounceLoss = 0.965;

        // fragmentation
        this.breakVelocity = 1;
        this.minBreakRadius = 3;
        this.fragmentCountMin = 2;
        this.fragmentCountMax = 5;

        // settling
        this.sleepThreshold = 0.15;

        // rendering
        this.backgroundFade = 0.918;
        this.particleBrightness = 220;

        // canvas stuff
        this.canvas = null;
        this.ctx = null;
        this.canvasW = 0;
        this.canvasH = 0;
    }
    initCanvas(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext("2d");
    }
    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;   
        this.canvasW = this.canvas.width;
        this.canvasH = this.canvas.height;     
    }
}
//
// ======================================================
// SETUP
// ======================================================
//
const config = new Config();
config.initCanvas("canvas");

window.addEventListener("resize", config.resize);
config.resize();

class HailParticle {

    constructor(x, y, radius, vx, vy) {

        this.x = x;
        this.y = y;

        this.vx = vx;
        this.vy = vy;

        this.radius = radius;

        // larger particles feel heavier
        this.mass = radius * 0.15;

        this.sleeping = false;
    }
    update(cfg, particlesArray) {

        if (this.sleeping) return;
        //
        // gravity
        //
        this.vy += cfg.gravity * this.mass;
        //
        // air resistance
        //
        this.vx *= (1 - cfg.airDrag);
        this.vy *= (1 - cfg.airDrag);
        //
        // movement
        //
        this.x += this.vx;
        this.y += this.vy;
        //
        // floor collision
        //
        if (this.y + this.radius >= cfg.canvasH) {
            this.y = cfg.canvasH - this.radius;
            //
            // bounce
            //
            this.vy *= -cfg.bounceLoss;
            //
            // friction
            //
            this.vx *= 0.92;
            //
            // fragmentation
            //
            if (
                Math.abs(this.vy) > cfg.breakVelocity &&
                this.radius > cfg.minBreakRadius
            ) {
                this.breakApart(cfg, particlesArray);
            }
            //
            // sleep check
            //
            if (Math.abs(this.vy) < cfg.sleepThreshold) {
                this.vy = 0;
                this.vx = 0;
                this.sleeping = true;
            }
        }
    }
    breakApart(cfg, particlesArray) {

        const count = mt_rand(cfg.fragmentCountMin, cfg.fragmentCountMax);

        for (let i = 0; i < count; i++) {

            const newRadius =
                this.radius * mt_randf(0.35, 0.6);

            const angle =
                Math.random() * Math.PI * 2;

            const speed =
                mt_randf(1, 4);

            particlesArray.push(
                new HailParticle(
                    this.x,
                    this.y,

                    newRadius,

                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed * 0.5
                )
            );
        }
        //
        // remove original
        //
        this.radius = 0;
        this.sleeping = true;
    }
    draw(cfg) {

        const brightness =
            cfg.particleBrightness;

        cfg.ctx.fillStyle =
            `rgb(${brightness}, ${brightness}, ${brightness})`;

        cfg.ctx.beginPath();

        cfg.ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI * 2
        );

        cfg.ctx.fill();
    }
}
//
// ======================================================
// SPAWNING
// ======================================================
//
class ParticleSystem {
    constructor(cfg) {
        this.cfg = cfg;
        this.particles = [];
    }
    spawn() {
        if ( this.particles.length >= this.cfg.maxParticles ) return;
        const radius =
            mt_randf(
                this.cfg.minRadius,
                this.cfg.maxRadius
            );

        this.particles.push(

            new HailParticle(

                mt_randf(0, this.cfg.canvasW),

                -20,

                radius,

                mt_randf(-0.5, 0.5),

                mt_randf(
                    this.cfg.minFallSpeed,
                    this.cfg.maxFallSpeed
                )
            )
        );
    }
    update() {
        for (let i = this.particles.length - 1; i >= 0; i--) {

            const p = this.particles[i];

            p.update(this.cfg, this.particles);
            p.draw(this.cfg);

            //
            // cleanup dead particles
            //
            if (p.radius <= 0) {
                this.particles.splice(i, 1);
            }
        }
    }
}

const particleSystem = new ParticleSystem(config);


//
// ======================================================
// LOOP
// ======================================================
//

function animate(timestamp) {

    requestAnimationFrame(animate);

    //
    // dark fade
    //
    config.ctx.fillStyle =
        `rgba(10,10,14,${config.backgroundFade})`;

    config.ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    //
    // spawn
    //
    for (let i = 0; i < config.spawnRate; i++) {
        particleSystem.spawn();
    }

    //
    // update/draw
    //
    particleSystem.update();
}

animate(performance.now());



</script>

</body>
</html>
