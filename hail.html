<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hail Prototype</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: rgb(10, 10, 14);
    }

    canvas {
        display: block;
    }
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script type="text/javascript">
//
// ======================================================
// HELPERS
// ======================================================
//
function mt_randf(min, max) {
    return min + Math.random() * (max - min);
}

function mt_rand(min, max) {
    return Math.floor(mt_randf(min, max + 1));
}
function createOptions(px, py, r, pvx, pvy) {
    return {
        radius: r,
        x: px,
        y: py,
        vx: pvx,
        vy: pvy
    };
}
//
// ======================================================
// CONFIG
// ======================================================
//
class Config {

    constructor() {

        // physics
        this.gravity = 0.31;
        this.airDrag = 0.051;
        this.groundFriction = 0.972;
        // horizontal wind
        // negative = left
        // positive = right
        this.windSpeed = -0.0125;

        // spawning
        this.spawnRate = 60;         // particles per frame
        this.maxParticles = 400;

        // hail sizes
        this.minRadius = 1;
        this.maxRadius = 6;

        // velocity
        this.minFallSpeed = 2;
        this.maxFallSpeed = 4;

        // bounce
        this.bounceLoss = 0.965;

        // fragmentation
        this.breakVelocity = 2;
        this.minBreakRadius = 1;
        this.fragmentCountMin = 3;
        this.fragmentCountMax = 5;

        // settling
        this.sleepThreshold = 0.25;

        // rendering
        this.backgroundFade = 1;
        this.particleBrightness = 220;

        // aging / cleanup
        this.enableAging = true;
        this.sleepFadeStart = 120;
        this.sleepFadeEnd = 240;
        this.radiusShrinkRate = 0.985;

        // canvas stuff
        this.canvas = null;
        this.ctx = null;
        this.canvasW = 0;
        this.canvasH = 0;
    }
    initCanvas(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext("2d");
    }
    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;   
        this.canvasW = this.canvas.width;
        this.canvasH = this.canvas.height;     
    }
}
//
// ======================================================
// SETUP
// ======================================================
//
const config = new Config();
config.initCanvas("canvas");

window.addEventListener("resize", config.resize);
config.resize();

class HailParticle {

    constructor(opts) {

        this.x = opts.x;
        this.y = opts.y;

        this.vx = opts.vx;
        this.vy = opts.vy;

        this.radius = opts.radius;

        // larger particles feel heavier
        this.mass = this.radius * 0.15;

        // status & removal
        this.sleeping = false;
        this.sleepAge = 0;
        this.alpha = 1;
        this.dead = false;
    }
    update(cfg, particlesArray) {

        if (this.sleeping) {
            if ( this.dead ) return; 
            this.sleepAge++;
            this.alpha *= 0.99;
            this.radius *= cfg.radiusShrinkRate;
            if ( this.dead === false && (this.radius <= 0.05 || this.alpha <= 0.01))
                this.dead = true;
            return;
        }
        //
        // gravity
        //
        this.vy += cfg.gravity * this.mass;
        //
        // wind
        // smaller particles are affected more
        //
        this.vx += cfg.windSpeed / this.mass;
        //
        // air resistance
        //
        this.vx *= (1 - cfg.airDrag);
        this.vy *= (1 - cfg.airDrag);
        //
        // movement
        //
        this.x += this.vx;
        this.y += this.vy;
        //
        // floor collision
        //
        if (this.y + this.radius >= cfg.canvasH) {
            this.y = cfg.canvasH - this.radius;
            //
            // bounce
            //
            this.vy *= -cfg.bounceLoss;
            //
            // friction
            //
            this.vx *= cfg.groundFriction;
            //
            // fragmentation
            //
            if (
                Math.abs(this.vy) > cfg.breakVelocity &&
                this.radius > cfg.minBreakRadius
            ) {
                this.shatter(cfg, particlesArray);
            }
            //
            // sleep check
            //
            if (Math.abs(this.vy) < cfg.sleepThreshold) {
                this.vy = 0;
                this.vx = 0;
                this.sleeping = true;
            }
        }
    }
    shatter(cfg, particleSys) {

        const count = mt_rand(cfg.fragmentCountMin, cfg.fragmentCountMax);

        for ( let i = 0; i < count; i++ ) {
            const angle = Math.random() * Math.PI * 2;
            const speed = mt_randf(1, 4);

            const options = createOptions(
                this.x,
                this.y,
                this.radius * mt_randf(0.35, 0.6),
                Math.cos(angle) * speed,
                Math.sin(angle) * speed * 0.5
            );
            particleSys.spawn(new HailParticle(options));
        }
        //
        // remove original
        //
        this.radius = 0;
        this.sleeping = true;
    }
    outOfView(cfg) {
        if (( this.x < 0 || this.x > cfg.canvasW ) || ( this.y < -20 || this.y > cfg.canvasH )) {
            this.dead = true;
            return true;
        }
        return false;
    }
    draw(cfg) {
        if ( this.outOfView(cfg) ) return;

        const brightness =
            cfg.particleBrightness;

        cfg.ctx.fillStyle =
            `rgba(${brightness}, ${brightness}, ${brightness}, ${this.alpha})`;

        cfg.ctx.beginPath();

        cfg.ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI * 2
        );

        cfg.ctx.fill();
    }
}
//
// ======================================================
// SPAWNING
// ======================================================
//
class ParticleSystem {
    constructor(cfg) {
        this.cfg = cfg;
        this.particles = [];
    }
    spawn(opts=false) {
        if ( this.particles.length >= this.cfg.maxParticles ) return;
        let options  = {};
        if ( opts === false ) {
            options = createOptions(
                mt_randf(0, this.cfg.canvasW),
                0,
                mt_randf(this.cfg.minRadius, this.cfg.maxRadius),
                mt_randf(-0.5, 0.5),
                mt_randf(this.cfg.minFallSpeed,this.cfg.maxFallSpeed)
            );
        }
        else 
            options = opts;

        this.particles.push(new HailParticle(options));
    }
    update() {
        for (let i = this.particles.length - 1; i >= 0; i--) {

            const p = this.particles[i];

            p.update(this.cfg, this);
            p.draw(this.cfg);

            //
            // cleanup dead particles
            //
            if ( p.dead ) {
                this.particles.splice(i, 1);
            }
        }
        console.log(this.particles.length);
    }
}

const particleSystem = new ParticleSystem(config);


//
// ======================================================
// LOOP
// ======================================================
//

function animate(timestamp) {

    requestAnimationFrame(animate);

    //
    // dark fade
    //
    config.ctx.fillStyle =
        `rgba(10,10,14,${config.backgroundFade})`;

    config.ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    //
    // spawn
    //
    for (let i = 0; i < config.spawnRate; i++) {
        particleSystem.spawn();
    }

    //
    // update/draw
    //
    particleSystem.update();
}

animate(performance.now());



</script>

</body>
</html>
